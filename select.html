<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Your Brett — Brett Lechtenberg (concept)</title>
<meta name="description" content="Concept: character-select. Four builds of Brett Lechtenberg — pick yours and lock in.">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #070607; --text: #EDE9E1; --dim: #8B8578; --accent: #D4AF37; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

/* ---------- stage ---------- */
#stage { position: fixed; inset: 0; transition: opacity 0.5s; }
#stage::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 55% at 50% 42%, color-mix(in srgb, var(--accent) 16%, transparent) 0%, transparent 70%),
    repeating-linear-gradient(90deg, rgba(237, 233, 225, 0.025) 0 1px, transparent 1px 90px),
    linear-gradient(180deg, #0B0910 0%, #070607 70%);
  transition: background 0.5s;
}
/* floor disc under the figure */
#floor {
  position: absolute; left: 50%; top: 76%; width: min(46vh, 560px); height: 9vh;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 38%, transparent) 0%, transparent 68%);
  filter: blur(4px); opacity: 0.8; transition: background 0.5s;
}

/* ---------- big preview figure ---------- */
#preview {
  position: absolute; left: 50%; bottom: 21vh; height: 62vh; aspect-ratio: var(--fig-ar, 0.32);
  transform: translateX(-50%);
  background-size: contain; background-repeat: no-repeat; background-position: bottom center;
  filter: drop-shadow(0 24px 40px rgba(0, 0, 0, 0.65));
  transition: opacity 0.18s ease-out;
}
#preview.swap { opacity: 0; }

/* ---------- name + readout (left column) ---------- */
#readout { position: absolute; left: min(6vw, 80px); top: 50%; transform: translateY(-56%); max-width: 330px; z-index: 3; }
#r-tag { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); }
#r-name { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(34px, 3.6vw, 54px); line-height: 1.05; margin-top: 12px; }
#r-power { margin-top: 14px; font-size: 14.5px; line-height: 1.6; color: var(--dim); }
#stats { margin-top: 26px; display: grid; gap: 13px; }
.stat .s-label { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.stat .s-label b { color: var(--text); font-weight: 500; }
.stat .s-track { margin-top: 6px; height: 5px; border-radius: 3px; background: rgba(237, 233, 225, 0.09); overflow: hidden; }
.stat .s-fill { height: 100%; border-radius: 3px; background: var(--accent); width: 0; transition: width 0.55s cubic-bezier(0.2, 0.7, 0.3, 1); }

/* ---------- specialty readout (right column) ---------- */
#loadout { position: absolute; right: min(6vw, 80px); top: 50%; transform: translateY(-56%); max-width: 300px; z-index: 3; text-align: right; }
#l-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
#l-items { margin-top: 14px; display: grid; gap: 10px; }
.l-item { font-size: 14px; color: #C9C3B8; border-right: 2px solid var(--accent); padding-right: 14px; line-height: 1.45; }

/* ---------- header / footer ---------- */
#hud-top { position: fixed; top: 26px; left: 30px; z-index: 20; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.18em; color: var(--accent); }
#hud-top a { color: var(--accent); text-decoration: none; }
#concept-tag {
  position: fixed; top: 26px; right: 30px; z-index: 20;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); border: 1px dashed rgba(139, 133, 120, 0.5); border-radius: 20px; padding: 7px 14px;
}
#concept-tag a { color: var(--dim); }
#title { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 20; text-align: center; }
#title h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(24px, 2.8vw, 38px); }
#title p { margin-top: 6px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--dim); }

/* ---------- roster cards ---------- */
#roster {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 10;
  display: flex; gap: 14px; align-items: flex-end;
}
.card {
  position: relative; width: clamp(86px, 9.5vw, 130px); aspect-ratio: 3 / 4; border-radius: 10px;
  overflow: hidden; cursor: pointer; -webkit-tap-highlight-color: transparent;
  border: 1px solid rgba(237, 233, 225, 0.14); background: rgba(15, 13, 15, 0.8);
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
}
.card .c-fig {
  position: absolute; inset: 0;
  background-size: 140% auto; background-repeat: no-repeat; background-position: center 7%;
  filter: saturate(0.55) brightness(0.8); transition: filter 0.25s;
}
.card .c-num {
  position: absolute; top: 7px; left: 9px; z-index: 2;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--dim);
  text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
}
.card .c-name {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 2; padding: 18px 9px 8px;
  background: linear-gradient(180deg, transparent 0%, rgba(7, 6, 7, 0.92) 55%);
  font-family: 'DM Mono', monospace; font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: #CFC9BD;
}
.card:hover .c-fig, .card.active .c-fig { filter: saturate(1) brightness(1.05); }
.card.active {
  transform: translateY(-12px);
  border-color: var(--card-accent);
  box-shadow: 0 0 0 1px var(--card-accent), 0 0 34px color-mix(in srgb, var(--card-accent) 45%, transparent);
}
.card.active .c-num { color: var(--card-accent); }

/* ---------- lock-in button ---------- */
#lockin {
  position: fixed; bottom: 26px; right: min(6vw, 80px); z-index: 10;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--bg); background: var(--accent); border: none; border-radius: 30px;
  padding: 14px 28px; cursor: pointer; transition: background 0.4s, transform 0.15s;
  animation: lockpulse 2.4s ease-in-out infinite;
}
#lockin:hover { transform: scale(1.05); }
@keyframes lockpulse { 0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 55%, transparent); } 50% { box-shadow: 0 0 0 12px transparent; } }
#keys {
  position: fixed; bottom: 32px; left: min(6vw, 80px); z-index: 10;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim);
}
#keys b { color: var(--text); font-weight: 500; }

/* ---------- lock-in flash + dossier ---------- */
#flash { position: fixed; inset: 0; z-index: 40; pointer-events: none; opacity: 0; background: var(--accent); transition: opacity 0.12s ease-in; }
#flash.on { opacity: 0.85; }
#fade { position: fixed; inset: 0; z-index: 39; pointer-events: none; opacity: 0; background: var(--bg); transition: opacity 0.45s ease-in; }
#fade.on { opacity: 1; }
body.locked #stage, body.locked #readout, body.locked #loadout, body.locked #roster,
body.locked #lockin, body.locked #keys, body.locked #title, body.locked #concept-tag, body.locked #hud-top { opacity: 0; transition: opacity 0.4s; }

#dossier {
  position: fixed; inset: 0; z-index: 30; display: none; overflow-y: auto;
  background: var(--bg); opacity: 0; transition: opacity 0.7s;
}
#dossier.visible { display: block; }
#dossier.shown { opacity: 1; }
.d-hero { position: relative; height: 74vh; background-size: cover; background-position: center; }
.d-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,6,7,0.25) 0%, rgba(7,6,7,0) 35%, rgba(7,6,7,0.95) 100%); }
.d-hero-text { position: absolute; bottom: 40px; left: min(7vw, 90px); right: 7vw; z-index: 1; }
.d-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-hero-text h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(38px, 6vw, 76px); margin-top: 10px; }
.d-line { margin-top: 8px; font-size: 16px; color: var(--dim); }
.d-body { padding: 56px min(7vw, 90px) 100px; max-width: 1000px; }
.d-body h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 30px; }
.d-about { margin-top: 16px; font-size: 16.5px; line-height: 1.75; color: #C9C3B8; }
.d-stats { margin-top: 38px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.d-stats .s { border: 1px solid rgba(237, 233, 225, 0.1); border-radius: 12px; padding: 18px; }
.d-stats b { display: block; font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 26px; color: var(--accent); }
.d-stats span { display: block; margin-top: 5px; font-size: 12.5px; color: var(--dim); }
.d-engage-label { margin-top: 44px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-engage { margin-top: 12px; font-size: 16.5px; line-height: 1.7; }
.d-cta { margin-top: 36px; display: inline-block; text-decoration: none; color: var(--bg); background: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 0.06em; padding: 15px 34px; border-radius: 40px; }
#d-back {
  position: fixed; top: 24px; left: 26px; z-index: 45; display: none;
  border: 1px solid rgba(237, 233, 225, 0.18); background: rgba(10, 8, 8, 0.6);
  color: var(--text); border-radius: 30px; padding: 10px 22px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.14em; backdrop-filter: blur(10px);
}
#d-back:hover { border-color: var(--accent); color: var(--accent); }

/* ---------- mobile: stacked select ---------- */
@media (orientation: portrait) and (max-width: 820px), (max-height: 560px) {
  #hud-top, #concept-tag { display: none; }
  #readout { left: 22px; right: 22px; top: auto; bottom: 27vh; transform: none; max-width: none; }
  #r-name { font-size: 30px; }
  #r-power, #stats { display: none; }
  #loadout, #keys { display: none; }
  #preview { bottom: 34vh; height: 44vh; }
  #floor { top: 66%; }
  #roster { bottom: 88px; gap: 9px; width: calc(100% - 32px); justify-content: center; }
  .card { width: 22.5%; }
  .card.active { transform: translateY(-8px); }
  #lockin { right: 16px; left: 16px; bottom: 22px; width: calc(100% - 32px); }
  #title h1 { font-size: 21px; }
  #title { width: 92%; }
  .d-hero { height: 60vh; }
  .d-hero-text { left: 22px; right: 22px; }
  .d-body { padding: 44px 22px 90px; }
  .d-stats { grid-template-columns: 1fr; gap: 12px; }
}
</style>
</head>
<body>

<div id="stage">
  <div id="floor"></div>
  <div id="preview"></div>
</div>

<div id="hud-top">// <a href="index.html">brettlechtenberg.com</a></div>
<div id="concept-tag">concept c — <a href="index.html">back to lobby</a></div>
<div id="title">
  <h1>Select your Brett.</h1>
  <p>Four builds &nbsp;&middot;&nbsp; One player</p>
</div>

<div id="readout">
  <div id="r-tag"></div>
  <div id="r-name"></div>
  <div id="r-power"></div>
  <div id="stats"></div>
</div>

<div id="loadout">
  <div id="l-label">// signature moves</div>
  <div id="l-items"></div>
</div>

<div id="roster"></div>
<button id="lockin">lock in &nbsp;&#9166;</button>
<div id="keys"><b>&larr;&thinsp;&rarr;</b> browse &nbsp;&nbsp; <b>1&ndash;4</b> jump &nbsp;&nbsp; <b>enter</b> lock in</div>

<div id="flash"></div>
<div id="fade"></div>

<div id="dossier">
  <div class="d-hero" id="d-hero">
    <div class="d-hero-text">
      <div class="d-eyebrow" id="d-eyebrow"></div>
      <h1 id="d-name"></h1>
      <div class="d-line" id="d-line"></div>
    </div>
  </div>
  <div class="d-body">
    <h2 id="d-abouth"></h2>
    <p class="d-about" id="d-about"></p>
    <div class="d-stats" id="d-stats"></div>
    <div class="d-engage-label">// how to engage</div>
    <p class="d-engage" id="d-engage"></p>
    <a class="d-cta" href="contact.html">Start the conversation &rarr;</a>
  </div>
</div>
<button id="d-back">&larr; back to character select</button>

<script>
const SUITES = [
  { key: 'speaker', name: 'The Keynote Speaker', accent: '#D4AF37',
    power: 'Your audience leaves changed — not just entertained.',
    line: 'Keynotes, corporate training, and workshops.',
    bars: [['Stage Presence', 97], ['Substance', 92], ['Energy Transfer', 95], ['Monday Usefulness', 88]],
    moves: ['The Master\'s Edge keynote', 'Fortune 500 rooms — AmEx, Delta, Citigroup', '60–90 min, tuned to your industry'],
    aboutH: 'Transformation over transaction.',
    about: 'Science-backed keynotes built on the Master\'s Edge methodology — First Principles to clarify, Frontloading to simplify, and Flow to maximize — tailored to your room, your industry, and your outcomes. From Fortune 500 teams like American Express and Delta to chambers of commerce and championship locker rooms, Brett delivers transformation that outlasts the event.',
    stats: [['4 Lanes', 'one methodology'], ['Fortune 500', 'AmEx · Delta · Citigroup'], ['60–90 min', 'keynote to full-day']],
    engage: 'Booking keynotes, corporate trainings, and workshops. If your event needs energy AND substance — with tools your people use Monday morning — this is the suite.' },
  { key: 'coach', name: 'The Performance Coach', accent: '#C4324A',
    power: 'Finds the gap between where you are and who you could be.',
    line: 'The Master\'s Edge — Clarify. Simplify. Maximize.',
    bars: [['Pattern Reading', 96], ['Straight Talk', 94], ['Flow Science', 90], ['Accountability', 93]],
    moves: ['30+ years of real business ownership', 'Flow Research Collective–validated', 'Mindset · skillset · systems'],
    aboutH: 'A proven system for peak performance.',
    about: 'The Master\'s Edge is Brett\'s proprietary coaching methodology — built on 30+ years of real-world business ownership, original flow state research validated by the Flow Research Collective, and the same progressive mastery framework that creates black belts. He only teaches what he\'s tested in his own business. That\'s the difference.',
    stats: [['30+', 'years in business'], ['Flow Research', 'validated methodology'], ['3 Pillars', 'mindset · skillset · systems']],
    engage: 'Taking a limited number of private coaching clients — leaders, teams, and business owners ready to operate differently. No pitch. No pressure. Bring a real goal.' },
  { key: 'ai', name: 'The AI Strategist', accent: '#3FC1C9',
    power: 'Makes AI useful in your business — not just impressive in a demo.',
    line: 'AI strategy, implementation, and training for real-world businesses.',
    bars: [['Hype Resistance', 98], ['Build Speed', 91], ['Plain English', 95], ['Tool Mastery', 89]],
    moves: ['Workflow shipped before the room empties', 'Maps AI to real bottlenecks', 'Teaches the thinking, not the tool-of-the-week'],
    aboutH: 'From AI-curious to AI-operational.',
    about: 'AI strategy and implementation for real-world people and businesses — no hype, no jargon, no shelf-ware. Brett maps AI to the problems actually costing you time and money, and builds working workflows with you: your team ships a functioning AI workflow before they leave the room. The tools change weekly; the thinking is what he teaches.',
    stats: [['Hands-On', 'your team builds it live'], ['Real Workflows', 'shipped, not demoed'], ['No Hype', 'AI for real-world business']],
    engage: 'Booking AI strategy sessions, implementation sprints, and team trainings. Bring the bottleneck — Brett will show you where AI actually fits, and where it doesn\'t.' },
  { key: 'trainer', name: 'The Corporate Trainer', accent: '#9AA5A0',
    power: 'Keynotes inspire. Training transforms.',
    line: 'Hands-on workshops. Tools they use Monday morning.',
    bars: [['Customization', 95], ['Hands-On Reps', 94], ['Retention', 92], ['Zero Recycled Decks', 99]],
    moves: ['Winning Team Culture', 'The AI Edge · Reclaiming The Clock', 'The Honest Close'],
    aboutH: 'Train the team you actually have.',
    about: 'Hands-on workshops built on the Master\'s Edge — customized to your team, your industry, and the problem you\'re actually solving. Winning Team Culture. The AI Edge. Reclaiming The Clock. The Honest Close. No off-the-shelf content, no recycled decks.',
    stats: [['4 Workshops', 'culture · AI · time · sales'], ['Hands-On', 'build it before you leave'], ['90 min', 'to multi-phase programs']],
    engage: 'Booking half-day and full-day trainings. Tell Brett the problem you\'re solving — he\'ll tell you honestly if he\'s the right fit.' },
];

const FIG_AR = { speaker: 228 / 700, coach: 209 / 700, ai: 222 / 700, trainer: 219 / 700 };
let sel = 0, locked = false, swapTimer = null;

/* build roster cards */
const roster = document.getElementById('roster');
SUITES.forEach((s, i) => {
  const c = document.createElement('div');
  c.className = 'card';
  c.style.setProperty('--card-accent', s.accent);
  c.innerHTML = `
    <div class="c-fig" style="background-image:url(assets/${s.key}-cut.png)"></div>
    <div class="c-num">0${i + 1}</div>
    <div class="c-name">${s.name.replace('The ', '')}</div>`;
  c.addEventListener('mouseenter', () => { if (!locked && sel !== i) select(i); });
  c.addEventListener('click', () => {
    if (locked) return;
    if (sel === i) lockIn(); else select(i);
  });
  roster.appendChild(c);
});
const cards = [...roster.children];

function select(i, instant) {
  sel = i;
  const s = SUITES[i];
  document.documentElement.style.setProperty('--accent', s.accent);
  cards.forEach((c, j) => c.classList.toggle('active', j === i));
  const pv = document.getElementById('preview');
  const apply = () => {
    pv.style.backgroundImage = `url(assets/${s.key}-cut.png)`;
    pv.style.setProperty('--fig-ar', FIG_AR[s.key]);
    pv.classList.remove('swap');
  };
  clearTimeout(swapTimer);
  if (instant) { apply(); } else { pv.classList.add('swap'); swapTimer = setTimeout(apply, 180); }

  document.getElementById('r-tag').textContent = `// build 0${i + 1} of 04`;
  document.getElementById('r-name').textContent = s.name;
  document.getElementById('r-power').textContent = s.power;
  const st = document.getElementById('stats');
  st.innerHTML = s.bars.map(b => `
    <div class="stat">
      <div class="s-label"><b>${b[0]}</b><span>${b[1]}</span></div>
      <div class="s-track"><div class="s-fill" data-w="${b[1]}"></div></div>
    </div>`).join('');
  requestAnimationFrame(() => requestAnimationFrame(() =>
    st.querySelectorAll('.s-fill').forEach(f => f.style.width = f.dataset.w + '%')));
  document.getElementById('l-items').innerHTML =
    s.moves.map(m => `<div class="l-item">${m}</div>`).join('');
}

function lockIn() {
  if (locked) return;
  locked = true;
  const flash = document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 160);
  setTimeout(() => { document.body.classList.add('locked'); document.getElementById('fade').classList.add('on'); }, 200);
  setTimeout(() => openDossier(sel), 750);
}

function openDossier(i) {
  const s = SUITES[i];
  document.getElementById('d-hero').style.backgroundImage = `url(assets/${s.key}-hero.jpg)`;
  document.getElementById('d-eyebrow').textContent = `// build 0${i + 1} — locked in`;
  document.getElementById('d-name').textContent = s.name;
  document.getElementById('d-line').textContent = s.line;
  document.getElementById('d-abouth').textContent = s.aboutH;
  document.getElementById('d-about').textContent = s.about;
  document.getElementById('d-stats').innerHTML = s.stats.map(x => `<div class="s"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');
  document.getElementById('d-engage').textContent = s.engage;
  const d = document.getElementById('dossier');
  d.scrollTop = 0; d.classList.add('visible');
  requestAnimationFrame(() => d.classList.add('shown'));
  document.getElementById('d-back').style.display = 'block';
  setTimeout(() => document.getElementById('fade').classList.remove('on'), 250);
}

function back() {
  if (!locked) return;
  const d = document.getElementById('dossier');
  d.classList.remove('shown');
  document.getElementById('d-back').style.display = 'none';
  setTimeout(() => d.classList.remove('visible'), 700);
  document.body.classList.remove('locked');
  locked = false;
}

document.getElementById('lockin').addEventListener('click', lockIn);
document.getElementById('d-back').addEventListener('click', back);
addEventListener('keydown', e => {
  if (e.key === 'Escape') { back(); return; }
  if (locked) return;
  if (e.key === 'ArrowRight') select((sel + 1) % 4);
  else if (e.key === 'ArrowLeft') select((sel + 3) % 4);
  else if (e.key === 'Enter') lockIn();
  else { const n = parseInt(e.key); if (n >= 1 && n <= 4) select(n - 1); }
});

select(0, true);
</script>
</body>
</html>
