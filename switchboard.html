<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Switchboard — Brett Lechtenberg (concept)</title>
<meta name="description" content="Concept: the Lechtenberg Exchange. Six lines, one operator. Which Brett do you need?">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #070607; --text: #EDE9E1; --dim: #8B8578; --accent: #D4AF37; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

/* ---------- dossier ---------- */
#dossier { position: fixed; inset: 0; z-index: 40; display: none; overflow-y: auto; background: var(--bg); }
#dossier.visible { display: block; }
.d-hero { position: relative; height: 74vh; background-size: cover; background-position: center; }
.d-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,6,7,0.25) 0%, rgba(7,6,7,0) 35%, rgba(7,6,7,0.95) 100%); }
.d-hero-text { position: absolute; bottom: 40px; left: min(7vw, 90px); right: 7vw; z-index: 1; }
.d-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-hero-text h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(38px, 6vw, 76px); margin-top: 10px; }
.d-line { margin-top: 8px; font-size: 16px; color: var(--dim); }
.d-body { padding: 56px min(7vw, 90px) 100px; max-width: 1000px; }
.d-body h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 30px; }
.d-about { margin-top: 16px; font-size: 16.5px; line-height: 1.75; color: #C9C3B8; }
.d-stats { margin-top: 38px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.d-stats .s { border: 1px solid rgba(237, 233, 225, 0.1); border-radius: 12px; padding: 18px; }
.d-stats b { display: block; font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 26px; color: var(--accent); }
.d-stats span { display: block; margin-top: 5px; font-size: 12.5px; color: var(--dim); }
.d-engage-label { margin-top: 44px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-engage { margin-top: 12px; font-size: 16.5px; line-height: 1.7; }
.d-cta { margin-top: 36px; display: inline-block; text-decoration: none; color: var(--bg); background: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 0.06em; padding: 15px 34px; border-radius: 40px; }
#d-back {
  position: fixed; top: 24px; left: 26px; z-index: 45; display: none;
  border: 1px solid rgba(237, 233, 225, 0.18); background: rgba(10, 8, 8, 0.6);
  color: var(--text); border-radius: 30px; padding: 10px 22px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.14em; backdrop-filter: blur(10px);
}
#d-back:hover { border-color: var(--accent); color: var(--accent); }

/* ---------- the exchange room ---------- */
body::before {  /* wood-paneled wall + lamp glow */
  content: ''; position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 50% 42% at 50% 6%, rgba(212, 175, 55, 0.13), transparent 70%),
    repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.16) 0 3px, transparent 3px 150px),
    linear-gradient(180deg, #191309 0%, #0E0A06 55%, #080604 100%);
}

/* ---------- the switchboard ---------- */
#board {
  position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 2;
  width: min(860px, 94vw);
  background:
    repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.12) 0 2px, transparent 2px 90px),
    linear-gradient(165deg, #35270F 0%, #241A0A 45%, #17110A 100%);
  border: 2px solid rgba(212, 175, 55, 0.35); border-radius: 18px;
  box-shadow: 0 40px 110px rgba(0, 0, 0, 0.75), inset 0 1px 0 rgba(255, 226, 140, 0.2), inset 0 0 120px rgba(0, 0, 0, 0.5);
  padding: 26px 30px 30px;
}
#brand { display: flex; align-items: center; justify-content: center; gap: 14px; }
#brand .b-face {
  width: 52px; height: 52px; border-radius: 50%;
  background: url(assets/plaque-face.png) center / cover no-repeat;
  border: 2px solid var(--accent); box-shadow: 0 0 16px rgba(212, 175, 55, 0.4);
}
#brand .b-name { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: clamp(20px, 2.6vw, 30px); letter-spacing: 0.03em; white-space: nowrap; }
#brand .b-sub { margin-top: 2px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); white-space: nowrap; }
#jacks { position: relative; margin-top: 22px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.jack {
  position: relative; cursor: pointer; font-family: inherit; color: var(--text); text-align: center;
  background: rgba(7, 6, 7, 0.4); border: 1px solid rgba(237, 233, 225, 0.1); border-radius: 12px;
  padding: 14px 10px 12px;
  transition: border-color 0.25s, background 0.25s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.jack:hover { border-color: var(--j-accent); background: rgba(12, 10, 7, 0.6); transform: translateY(-2px); }
.jack.on { border-color: var(--j-accent); }
.jack .lamp {
  position: absolute; top: 9px; right: 10px; width: 9px; height: 9px; border-radius: 50%;
  background: #2A2318; border: 1px solid rgba(212, 175, 55, 0.35);
}
.jack.on .lamp { background: var(--j-accent); box-shadow: 0 0 12px var(--j-accent); animation: ringlamp 0.9s infinite; }
@keyframes ringlamp { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
.jack .j-ring {
  display: block; width: 62px; height: 62px; margin: 0 auto; border-radius: 50%; position: relative;
  background-color: #241C0E;
  background-size: 215% auto; background-repeat: no-repeat; background-position: center 3px;
  border: 3px solid rgba(212, 175, 55, 0.5);
  box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.55), 0 1px 0 rgba(255, 226, 140, 0.15);
  transition: border-color 0.25s, box-shadow 0.25s;
}
.jack:hover .j-ring, .jack.on .j-ring { border-color: var(--j-accent); box-shadow: 0 0 20px color-mix(in srgb, var(--j-accent) 55%, transparent), inset 0 3px 6px rgba(0, 0, 0, 0.55); }
.jack .j-line { display: block; margin-top: 9px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.16em; color: var(--dim); }
.jack .j-name { display: block; margin-top: 3px; font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; }
.jack.on .j-name { color: var(--j-accent); }
.jack .j-power { display: block; margin-top: 5px; font-size: 11px; line-height: 1.35; color: var(--dim); }
body.connecting .jack { pointer-events: none; }

/* patch cord SVG overlays the jack grid */
#cordsvg { position: absolute; inset: 0; z-index: 5; pointer-events: none; overflow: visible; }
#cord { fill: none; stroke: #C8A24A; stroke-width: 5; stroke-linecap: round; filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6)); }
#plug { fill: #E9C767; stroke: #6B5316; stroke-width: 2; visibility: hidden; }
body.connecting #plug, body.patched #plug { visibility: visible; }

/* ---------- hud ---------- */
#hud-top { position: fixed; top: 26px; left: 30px; z-index: 20; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.18em; color: var(--accent); transition: opacity 0.5s; }
#hud-top a { color: var(--accent); text-decoration: none; }
#concept-tag {
  position: fixed; bottom: 26px; right: 30px; z-index: 20;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); border: 1px dashed rgba(139, 133, 120, 0.5); border-radius: 20px; padding: 7px 14px;
}
#concept-tag a { color: var(--dim); }
#status {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 20;
  font-family: 'DM Mono', monospace; font-size: 11.5px; letter-spacing: 0.2em; text-transform: uppercase; color: #E9C767;
  background: rgba(10, 8, 8, 0.55); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 30px;
  padding: 10px 22px; white-space: nowrap; transition: opacity 0.4s;
}

/* ---------- mobile ---------- */
@media (orientation: portrait) and (max-width: 820px), (max-height: 560px) {
  #hud-top, #concept-tag { display: none; }
  #board { width: calc(100vw - 20px); padding: 18px 12px 16px; }
  #brand { flex-direction: column; text-align: center; gap: 8px; }
  #brand .b-face { width: 40px; height: 40px; }
  #brand .b-name { white-space: normal; font-size: 20px; }
  #brand .b-sub { white-space: normal; font-size: 8px; letter-spacing: 0.2em; }
  #jacks { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 16px; }
  .jack .j-ring { width: 52px; height: 52px; }
  .jack .j-power { display: none; }
  .jack:hover { transform: none; }
  #status { bottom: 16px; font-size: 9.5px; padding: 8px 16px; }
  .d-hero { height: 60vh; }
  .d-hero-text { left: 22px; right: 22px; }
  .d-body { padding: 44px 22px 90px; }
  .d-stats { grid-template-columns: 1fr; gap: 12px; }
}
</style>
</head>
<body>

<div id="dossier">
  <div class="d-hero" id="d-hero">
    <div class="d-hero-text">
      <div class="d-eyebrow" id="d-eyebrow"></div>
      <h1 id="d-name"></h1>
      <div class="d-line" id="d-line"></div>
    </div>
  </div>
  <div class="d-body">
    <h2 id="d-abouth"></h2>
    <p class="d-about" id="d-about"></p>
    <div class="d-stats" id="d-stats"></div>
    <div class="d-engage-label">// how to engage</div>
    <p class="d-engage" id="d-engage"></p>
    <a class="d-cta" href="contact.html">Start the conversation &rarr;</a>
  </div>
</div>
<button id="d-back">&larr; back to the switchboard</button>

<div id="board">
  <div id="brand">
    <div class="b-face"></div>
    <div>
      <div class="b-name">The Lechtenberg Exchange</div>
      <div class="b-sub">est. 30+ yrs &middot; operator on duty: brett lechtenberg</div>
    </div>
  </div>
  <div id="jacks">
    <svg id="cordsvg"><path id="cord" d=""/><circle id="plug" r="7" cx="-20" cy="-20"/></svg>
  </div>
</div>

<div id="hud-top">// <a href="index.html">brettlechtenberg.com</a></div>
<div id="concept-tag">concept f — <a href="index.html">back to lobby</a></div>
<div id="status">which brett do you need? &mdash; pick a line</div>

<script>
const SUITES = [
  { key: 'speaker', name: 'The Keynote Speaker', accent: '#D4AF37', line: 'LINE 1',
    power: 'Your audience leaves changed — not just entertained.',
    tagline: 'Keynotes, corporate training, and workshops.',
    aboutH: 'Transformation over transaction.',
    about: 'Science-backed keynotes built on the Master\'s Edge methodology — First Principles to clarify, Frontloading to simplify, and Flow to maximize — tailored to your room, your industry, and your outcomes. From Fortune 500 teams like American Express and Delta to chambers of commerce and championship locker rooms, Brett delivers transformation that outlasts the event.',
    stats: [['4 Lanes', 'one methodology'], ['Fortune 500', 'AmEx · Delta · Citigroup'], ['60–90 min', 'keynote to full-day']],
    engage: 'Booking keynotes, corporate trainings, and workshops. If your event needs energy AND substance — with tools your people use Monday morning — this is the suite.' },
  { key: 'coach', name: 'The Performance Coach', accent: '#C4324A', line: 'LINE 2',
    power: 'Finds the gap between where you are and who you could be.',
    tagline: 'The Master\'s Edge — Clarify. Simplify. Maximize.',
    aboutH: 'A proven system for peak performance.',
    about: 'The Master\'s Edge is Brett\'s proprietary coaching methodology — built on 30+ years of real-world business ownership, original flow state research validated by the Flow Research Collective, and the same progressive mastery framework that creates black belts. He only teaches what he\'s tested in his own business. That\'s the difference.',
    stats: [['30+', 'years in business'], ['Flow Research', 'validated methodology'], ['3 Pillars', 'mindset · skillset · systems']],
    engage: 'Taking a limited number of private coaching clients — leaders, teams, and business owners ready to operate differently. No pitch. No pressure. Bring a real goal.' },
  { key: 'ai', name: 'The AI Strategist', accent: '#3FC1C9', line: 'LINE 3',
    power: 'Makes AI useful in your business — not just impressive in a demo.',
    tagline: 'AI strategy, implementation, and training for real-world businesses.',
    aboutH: 'From AI-curious to AI-operational.',
    about: 'AI strategy and implementation for real-world people and businesses — no hype, no jargon, no shelf-ware. Brett maps AI to the problems actually costing you time and money, and builds working workflows with you: your team ships a functioning AI workflow before they leave the room. The tools change weekly; the thinking is what he teaches.',
    stats: [['Hands-On', 'your team builds it live'], ['Real Workflows', 'shipped, not demoed'], ['No Hype', 'AI for real-world business']],
    engage: 'Booking AI strategy sessions, implementation sprints, and team trainings. Bring the bottleneck — Brett will show you where AI actually fits, and where it doesn\'t.' },
  { key: 'trainer', name: 'The Corporate Trainer', accent: '#9AA5A0', line: 'LINE 4',
    power: 'Keynotes inspire. Training transforms.',
    tagline: 'Hands-on workshops. Tools they use Monday morning.',
    aboutH: 'Train the team you actually have.',
    about: 'Hands-on workshops built on the Master\'s Edge — customized to your team, your industry, and the problem you\'re actually solving. Winning Team Culture. The AI Edge. Reclaiming The Clock. The Honest Close. No off-the-shelf content, no recycled decks.',
    stats: [['4 Workshops', 'culture · AI · time · sales'], ['Hands-On', 'build it before you leave'], ['90 min', 'to multi-phase programs']],
    engage: 'Booking half-day and full-day trainings. Tell Brett the problem you\'re solving — he\'ll tell you honestly if he\'s the right fit.' },
  { key: 'sensei', name: 'The Sensei', accent: '#C0392B', line: 'LINE 5',
    power: 'Every other Brett was built in this room.',
    tagline: 'Martial arts mastery — 30+ years on the mat.',
    aboutH: 'Where the method was forged.',
    about: 'Before the keynotes, the coaching, and the AI workflows, there was the mat. Brett has spent 30+ years in the martial arts — building Personal Mastery Martial Arts in Utah, coaching students from first bow to black belt, and turning the dojo\'s progressive mastery framework into the Master\'s Edge methodology. His nationally recognized Anti-Bully and Anti-Cyber Bully programs came out of this room too. The dojo is where he learned the truth he teaches everywhere else: mastery is built, not born.',
    stats: [['30+', 'years on the mat'], ['Black Belt', 'progressive mastery framework'], ['Bullyproof', 'nationally recognized programs']],
    engage: 'Martial arts training, self-defense workshops, and anti-bully programs for schools, families, and teams. This is the room people don\'t expect — and the one that explains all the others.' },
  { key: 'author', name: 'The Author', accent: '#E8C84A', line: 'LINE 6',
    power: 'Teaches what he\'s tested. Writes what he\'s lived.',
    tagline: 'Seven books. Five bestsellers.',
    aboutH: 'Ideas that have helped thousands.',
    about: 'Seven books, five bestsellers — including three #1 Amazon bestsellers. Reclaiming The Clock on time and focus; The Anti-Bully Program and The Anti-Cyber Bully Program, nationally recognized and featured in USA Today; The Ultimate Travel Safety Program; Protecting Your Castle; and Bullyproof. The seventh — The Master\'s Edge, the definitive guide to his peak performance methodology — is forthcoming.',
    stats: [['7 Books', '5 bestsellers'], ['#1 Amazon', 'three times'], ['USA Today', 'national coverage']],
    engage: 'Media appearances, podcast interviews, and bulk orders for teams. Start with the free one — How to Build a Rockstar Team. The books are the door; walk through it.' },
];

const jacksEl = document.getElementById('jacks');
const statusEl = document.getElementById('status');
let connecting = false;

SUITES.forEach((s, i) => {
  const b = document.createElement('button');
  b.className = 'jack'; b.style.setProperty('--j-accent', s.accent);
  b.innerHTML = `
    <span class="lamp"></span>
    <span class="j-ring" style="background-image:url(assets/${s.key}-cut.png)"></span>
    <span class="j-line">${s.line}</span>
    <span class="j-name">${s.name.replace('The ', '')}</span>
    <span class="j-power">${s.power}</span>`;
  b.addEventListener('click', () => connect(i, b));
  jacksEl.appendChild(b);
});

/* ---------- sounds (user-gesture initiated) ---------- */
function plugClick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const len = Math.floor(ctx.sampleRate * 0.04);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const g = ctx.createGain(); g.gain.value = 0.12;
    src.connect(g).connect(ctx.destination); src.start();
  } catch (e) { /* silent */ }
}
function ringBurr(t0) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [440, 480].forEach(f => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, ctx.currentTime + t0);
      g.gain.linearRampToValueAtTime(0.045, ctx.currentTime + t0 + 0.04);
      g.gain.setValueAtTime(0.045, ctx.currentTime + t0 + 0.85);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t0 + 0.95);
      o.connect(g).connect(ctx.destination);
      o.start(ctx.currentTime + t0); o.stop(ctx.currentTime + t0 + 1);
    });
  } catch (e) { /* silent */ }
}

/* ---------- patch cord ---------- */
const cord = document.getElementById('cord');
const plug = document.getElementById('plug');
function cordPath(x1, y1, x2, y2) {
  const sag = 60 + Math.abs(x2 - x1) * 0.12;
  const mx = (x1 + x2) / 2, my = Math.max(y1, y2) + sag;
  return `M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`;
}
function throwCord(target, done) {
  const jr = jacksEl.getBoundingClientRect();
  const tr = target.querySelector('.j-ring').getBoundingClientRect();
  const x1 = jr.width / 2, y1 = jr.height + 40;   // rises from below the board
  const x2 = tr.left - jr.left + tr.width / 2, y2 = tr.top - jr.top + tr.height / 2;
  const t0 = performance.now(), DUR = 650;
  (function step(now) {
    const t = Math.min(1, (now - t0) / DUR);
    const e = 1 - Math.pow(1 - t, 3); // ease-out cubic
    const cx = x1 + (x2 - x1) * e, cy = y1 + (y2 - y1) * e;
    cord.setAttribute('d', cordPath(x1, y1, cx, cy));
    plug.setAttribute('cx', cx); plug.setAttribute('cy', cy);
    if (t < 1) requestAnimationFrame(step); else done();
  })(t0);
}
function resetCord() {
  cord.setAttribute('d', '');
  plug.setAttribute('cx', -20); plug.setAttribute('cy', -20);
}

/* ---------- connect flow ---------- */
function connect(i, btn) {
  if (connecting || document.body.classList.contains('patched')) return;
  connecting = true;
  document.body.classList.add('connecting');
  const s = SUITES[i];
  document.documentElement.style.setProperty('--accent', s.accent);
  statusEl.textContent = `patching you through — ${s.line.toLowerCase()} · ${s.name.toLowerCase()}`;
  throwCord(btn, () => {
    plugClick();
    btn.classList.add('on');
    ringBurr(0.15); ringBurr(1.45);
    setTimeout(() => {
      statusEl.textContent = 'connected — go ahead, caller';
      setTimeout(() => openDossier(i), 500);
    }, 2400);
  });
}

function openDossier(i) {
  const s = SUITES[i];
  document.getElementById('d-hero').style.backgroundImage = `url(assets/${s.key}-hero.jpg)`;
  document.getElementById('d-eyebrow').textContent = `// ${s.line.toLowerCase()} — the lechtenberg exchange — connected`;
  document.getElementById('d-name').textContent = s.name;
  document.getElementById('d-line').textContent = s.tagline;
  document.getElementById('d-abouth').textContent = s.aboutH;
  document.getElementById('d-about').textContent = s.about;
  document.getElementById('d-stats').innerHTML = s.stats.map(x => `<div class="s"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');
  document.getElementById('d-engage').textContent = s.engage;
  document.getElementById('dossier').classList.add('visible');
  document.getElementById('d-back').style.display = 'block';
  document.body.classList.add('patched');
  document.body.classList.remove('connecting');
  connecting = false;
}

function back() {
  if (!document.body.classList.contains('patched')) return;
  document.getElementById('d-back').style.display = 'none';
  document.getElementById('dossier').classList.remove('visible');
  document.getElementById('dossier').scrollTop = 0;
  document.body.classList.remove('patched');
  document.querySelectorAll('.jack').forEach(j => j.classList.remove('on'));
  resetCord();
  document.documentElement.style.setProperty('--accent', '#D4AF37');
  statusEl.textContent = 'line released — which brett do you need next?';
}
document.getElementById('d-back').addEventListener('click', back);

addEventListener('keydown', e => {
  if (e.key === 'Escape') return back();
  if (document.body.classList.contains('patched')) return;
  const n = parseInt(e.key);
  if (n >= 1 && n <= SUITES.length) connect(n - 1, jacksEl.querySelectorAll('.jack')[n - 1]);
});
</script>
</body>
