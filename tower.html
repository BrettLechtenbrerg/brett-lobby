<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tower — Brett Lechtenberg (concept)</title>
<meta name="description" content="Concept: pick the window that's lit for you. Four ways to work with Brett Lechtenberg.">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #070607; --text: #EDE9E1; --dim: #8B8578; --accent: #D4AF37; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

/* ---------- scene (fixed-aspect plate, covers viewport) ---------- */
#scene {
  position: fixed; transform-origin: 50% 50%;
  background: url(assets/tower.jpg) center / 100% 100% no-repeat;
  transition: transform 2s cubic-bezier(0.55, 0, 0.2, 1);
  will-change: transform;
}

/* ---------- windows ---------- */
.win {
  position: absolute; cursor: pointer; overflow: hidden;
  transition: box-shadow 0.4s, filter 0.4s;
  -webkit-tap-highlight-color: transparent;
}
.win:hover { filter: brightness(1.1); }
.win::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20, 12, 4, 0) 70%, rgba(10, 6, 3, 0.28) 100%);
}
/* figure is ~140% of the window height, anchored at the top — the sill clips him
   just above the knees so he reads as standing INSIDE the room */
.win .figure {
  position: absolute; left: 50%; top: 4%; height: 140%; aspect-ratio: var(--fig-ar);
  transform: translateX(-50%);
  background-size: contain; background-repeat: no-repeat; background-position: top center;
  filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.55)) brightness(1.04);
}

/* window labels — same convention as the lobby doors */
.win-tag, .win-name {
  position: absolute; transform: translateX(-50%); z-index: 2;
  font-family: 'DM Mono', monospace; letter-spacing: 0.2em; text-transform: uppercase;
  white-space: nowrap; pointer-events: none; text-shadow: 0 1px 8px rgba(0, 0, 0, 0.9);
}
.win-tag { font-size: clamp(9px, 0.75vw, 12px); }
.win-name { font-size: clamp(8px, 0.68vw, 11px); color: #CFC9BD; }
.win-tag, .win-name { transition: opacity 0.4s; }
body.zoomed .win-tag, body.zoomed .win-name { opacity: 0; }

/* ---------- HUD ---------- */
#hud-top { position: fixed; top: 26px; left: 30px; z-index: 20; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.18em; color: var(--accent); transition: opacity 0.5s; }
#hud-top a { color: var(--accent); text-decoration: none; }
#title { position: fixed; top: 26px; left: 50%; transform: translateX(-50%); z-index: 20; text-align: center; text-shadow: 0 2px 30px rgba(0,0,0,0.8); transition: opacity 0.5s; }
#title h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(26px, 3.2vw, 42px); }
#title p { margin-top: 8px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--dim); }
#hint {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #E9C767;
  background: rgba(10, 8, 8, 0.5); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 30px;
  padding: 11px 24px; pointer-events: none; white-space: nowrap;
  animation: pulse 2.4s ease-in-out infinite; transition: opacity 0.5s;
}
@keyframes pulse { 0%, 100% { opacity: 0.65; } 50% { opacity: 1; } }
body.zoomed #title, body.zoomed #plate, body.zoomed #concept-tag, body.zoomed #hud-top { opacity: 0; }
body.zoomed #hint { animation: none; opacity: 0; }
body.zoomed .win { filter: none !important; }
body.zoomed .win::after { display: none; }

/* ---------- hover plate ---------- */
#plate {
  position: fixed; z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.3s;
  background: rgba(10, 8, 8, 0.72); border: 1px solid rgba(237, 233, 225, 0.14);
  border-left: 3px solid var(--accent);
  backdrop-filter: blur(10px); border-radius: 10px; padding: 14px 20px; max-width: 250px;
}
#plate.show { opacity: 1; }
#plate .p-suite { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); }
#plate .p-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-top: 5px; }
#plate .p-power { margin-top: 6px; font-size: 12.5px; line-height: 1.5; color: var(--dim); }
#plate .p-enter { margin-top: 9px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }

/* ---------- flare + dossier ---------- */
#flare { position: fixed; inset: 0; z-index: 40; background: #070607; opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in; }
#flare.on { opacity: 1; }
/* passing through the glass: warm light bloom, not a plain blackout */
#flare.glass {
  background: radial-gradient(circle at 50% 45%, #FFF6E2 0%, #F2CE8A 34%, #8A5F28 62%, #120C05 100%);
  transition: opacity 0.4s ease-in;
}
#dossier {
  position: fixed; inset: 0; z-index: 30; display: none; overflow-y: auto;
  background: var(--bg); opacity: 0; transition: opacity 0.7s;
}
#dossier.visible { display: block; }
#dossier.shown { opacity: 1; }
.d-hero { position: relative; height: 74vh; background-size: cover; background-position: center; }
.d-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,6,7,0.25) 0%, rgba(7,6,7,0) 35%, rgba(7,6,7,0.95) 100%); }
.d-hero-text { position: absolute; bottom: 40px; left: min(7vw, 90px); right: 7vw; z-index: 1; }
.d-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-hero-text h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(38px, 6vw, 76px); margin-top: 10px; }
.d-line { margin-top: 8px; font-size: 16px; color: var(--dim); }
.d-body { padding: 56px min(7vw, 90px) 100px; max-width: 1000px; }
.d-body h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 30px; }
.d-about { margin-top: 16px; font-size: 16.5px; line-height: 1.75; color: #C9C3B8; }
.d-stats { margin-top: 38px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.d-stats .s { border: 1px solid rgba(237, 233, 225, 0.1); border-radius: 12px; padding: 18px; }
.d-stats b { display: block; font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 26px; color: var(--accent); }
.d-stats span { display: block; margin-top: 5px; font-size: 12.5px; color: var(--dim); }
.d-engage-label { margin-top: 44px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-engage { margin-top: 12px; font-size: 16.5px; line-height: 1.7; }
.d-cta { margin-top: 36px; display: inline-block; text-decoration: none; color: var(--bg); background: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 0.06em; padding: 15px 34px; border-radius: 40px; }
#d-back {
  position: fixed; top: 24px; left: 26px; z-index: 45; display: none;
  border: 1px solid rgba(237, 233, 225, 0.18); background: rgba(10, 8, 8, 0.6);
  color: var(--text); border-radius: 30px; padding: 10px 22px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.14em; backdrop-filter: blur(10px);
}
#d-back:hover { border-color: var(--accent); color: var(--accent); }

/* ---------- concept banner ---------- */
#concept-tag {
  position: fixed; top: 26px; right: 30px; z-index: 20; transition: opacity 0.5s;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); border: 1px dashed rgba(139, 133, 120, 0.5); border-radius: 20px; padding: 7px 14px;
}
#concept-tag a { color: var(--dim); }

/* ---------- mobile fallback: window cards ---------- */
#mobile-tower { display: none; }
@media (orientation: portrait) and (max-width: 820px) {
  #scene, #title, #hint, #plate, #concept-tag { display: none !important; }
  #mobile-tower {
    display: block; position: fixed; inset: 0; overflow-y: auto;
    background: linear-gradient(180deg, #0B0910 0%, #070607 100%); padding: 42px 20px 60px;
  }
  #mobile-tower .mt-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); }
  #mobile-tower h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 32px; margin-top: 10px; }
  #mt-cards { margin-top: 26px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .mt-card {
    position: relative; aspect-ratio: 3 / 5; border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(255, 190, 90, 0.35); background-size: cover; background-position: center 82%;
    box-shadow: inset 0 0 26px rgba(255, 190, 90, 0.25); cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .mt-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,200,110,0.12) 0%, rgba(7,6,7,0) 35%, rgba(7,6,7,0.85) 100%); }
  .mt-name { position: absolute; bottom: 30px; left: 12px; right: 12px; z-index: 1; font-family: 'Cormorant Garamond', serif; font-size: 19px; }
  .mt-tap { position: absolute; bottom: 10px; left: 12px; z-index: 1; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; }
  .d-hero { height: 60vh; }
  .d-hero-text { left: 22px; right: 22px; }
  .d-body { padding: 44px 22px 90px; }
  .d-stats { grid-template-columns: 1fr; gap: 12px; }
}
</style>
</head>
<body>

<div id="scene"></div>

<div id="hud-top">// <a href="index.html">brettlechtenberg.com</a></div>
<div id="concept-tag">concept b — <a href="index.html">back to lobby</a></div>
<div id="title">
  <h1>One of these windows is lit for you.</h1>
  <p>Four suites &nbsp;&middot;&nbsp; One Brett</p>
</div>
<div id="hint">find your window &mdash; step inside</div>

<div id="plate">
  <div class="p-suite" id="p-suite"></div>
  <div class="p-name" id="p-name"></div>
  <div class="p-power" id="p-power"></div>
  <div class="p-enter">click to ride up &rarr;</div>
</div>

<div id="flare"></div>

<div id="dossier">
  <div class="d-hero" id="d-hero">
    <div class="d-hero-text">
      <div class="d-eyebrow" id="d-eyebrow"></div>
      <h1 id="d-name"></h1>
      <div class="d-line" id="d-line"></div>
    </div>
  </div>
  <div class="d-body">
    <h2 id="d-abouth"></h2>
    <p class="d-about" id="d-about"></p>
    <div class="d-stats" id="d-stats"></div>
    <div class="d-engage-label">// how to engage</div>
    <p class="d-engage" id="d-engage"></p>
    <a class="d-cta" href="contact.html">Start the conversation &rarr;</a>
  </div>
</div>
<button id="d-back">&larr; back down to the street</button>

<div id="mobile-tower">
  <div class="mt-eyebrow">// the tower — concept</div>
  <h1>One of these windows is lit for you.</h1>
  <div id="mt-cards"></div>
</div>

<script>
const SUITES = [
  { key: 'speaker', name: 'The Keynote Speaker', accent: '#D4AF37',
    power: 'Your audience leaves changed — not just entertained.',
    line: 'Keynotes, corporate training, and workshops.',
    aboutH: 'Transformation over transaction.',
    about: 'Science-backed keynotes built on the Master\'s Edge methodology — First Principles to clarify, Frontloading to simplify, and Flow to maximize — tailored to your room, your industry, and your outcomes. From Fortune 500 teams like American Express and Delta to chambers of commerce and championship locker rooms, Brett delivers transformation that outlasts the event.',
    stats: [['4 Lanes', 'one methodology'], ['Fortune 500', 'AmEx · Delta · Citigroup'], ['60–90 min', 'keynote to full-day']],
    engage: 'Booking keynotes, corporate trainings, and workshops. If your event needs energy AND substance — with tools your people use Monday morning — this is the suite.' },
  { key: 'coach', name: 'The Performance Coach', accent: '#C4324A',
    power: 'Finds the gap between where you are and who you could be.',
    line: 'The Master\'s Edge — Clarify. Simplify. Maximize.',
    aboutH: 'A proven system for peak performance.',
    about: 'The Master\'s Edge is Brett\'s proprietary coaching methodology — built on 30+ years of real-world business ownership, original flow state research validated by the Flow Research Collective, and the same progressive mastery framework that creates black belts. He only teaches what he\'s tested in his own business. That\'s the difference.',
    stats: [['30+', 'years in business'], ['Flow Research', 'validated methodology'], ['3 Pillars', 'mindset · skillset · systems']],
    engage: 'Taking a limited number of private coaching clients — leaders, teams, and business owners ready to operate differently. No pitch. No pressure. Bring a real goal.' },
  { key: 'ai', name: 'The AI Strategist', accent: '#3FC1C9',
    power: 'Makes AI useful in your business — not just impressive in a demo.',
    line: 'AI strategy, implementation, and training for real-world businesses.',
    aboutH: 'From AI-curious to AI-operational.',
    about: 'AI strategy and implementation for real-world people and businesses — no hype, no jargon, no shelf-ware. Brett maps AI to the problems actually costing you time and money, and builds working workflows with you: your team ships a functioning AI workflow before they leave the room. The tools change weekly; the thinking is what he teaches.',
    stats: [['Hands-On', 'your team builds it live'], ['Real Workflows', 'shipped, not demoed'], ['No Hype', 'AI for real-world business']],
    engage: 'Booking AI strategy sessions, implementation sprints, and team trainings. Bring the bottleneck — Brett will show you where AI actually fits, and where it doesn\'t.' },
  { key: 'trainer', name: 'The Corporate Trainer', accent: '#9AA5A0',
    power: 'Keynotes inspire. Training transforms.',
    line: 'Hands-on workshops. Tools they use Monday morning.',
    aboutH: 'Train the team you actually have.',
    about: 'Hands-on workshops built on the Master\'s Edge — customized to your team, your industry, and the problem you\'re actually solving. Winning Team Culture. The AI Edge. Reclaiming The Clock. The Honest Close. No off-the-shelf content, no recycled decks.',
    stats: [['4 Workshops', 'culture · AI · time · sales'], ['Hands-On', 'build it before you leave'], ['90 min', 'to multi-phase programs']],
    engage: 'Booking half-day and full-day trainings. Tell Brett the problem you\'re solving — he\'ll tell you honestly if he\'s the right fit.' },
];

/* window rects, % of the tower.jpg plate (measured by brightness detection) */
const WINS = [
  { left: 41.80, top: 21.78, width: 7.16, height: 9.08 },
  { left: 50.26, top: 24.02, width: 6.51, height: 8.79 },
  { left: 59.11, top: 26.17, width: 4.82, height: 8.50 },
  { left: 66.02, top: 28.42, width: 4.56, height: 7.91 },
];

const FIG_AR = { speaker: 228 / 700, coach: 209 / 700, ai: 222 / 700, trainer: 219 / 700 };
const AR = 1536 / 1024;
const scene = document.getElementById('scene');
let zoomed = -1;

function fit() {
  const w = innerWidth, h = innerHeight;
  const sw = Math.max(w, h * AR), sh = sw / AR;
  scene.style.width = sw + 'px'; scene.style.height = sh + 'px';
  scene.style.left = (w - sw) / 2 + 'px'; scene.style.top = (h - sh) / 2 + 'px';
}
fit(); addEventListener('resize', () => { if (zoomed === -1) fit(); });

const plate = document.getElementById('plate');
SUITES.forEach((s, i) => {
  const r = WINS[i];
  const el = document.createElement('div');
  el.className = 'win';
  el.style.cssText = `left:${r.left}%; top:${r.top}%; width:${r.width}%; height:${r.height}%;`;
  el.innerHTML = `<div class="figure" style="background-image:url(assets/${s.key}-cut.png); --fig-ar:${FIG_AR[s.key]}"></div>`;
  const tag = document.createElement('div');
  tag.className = 'win-tag';
  tag.style.cssText = `left:${r.left + r.width / 2}%; top:${r.top - 2.6}%; color:${s.accent};`;
  tag.textContent = `window ${i + 1}`;
  const name = document.createElement('div');
  name.className = 'win-name';
  name.style.cssText = `left:${r.left + r.width / 2}%; top:${r.top + r.height + 1.1}%;`;
  name.textContent = s.name.replace('The ', '');
  scene.appendChild(tag); scene.appendChild(name);
  el.addEventListener('mouseenter', () => {
    if (zoomed !== -1) return;
    document.documentElement.style.setProperty('--accent', s.accent);
    document.getElementById('p-suite').textContent = `// suite ${i + 1}`;
    document.getElementById('p-name').textContent = s.name;
    document.getElementById('p-power').textContent = s.power;
    const b = el.getBoundingClientRect();
    const px = b.right + 18 + 250 < innerWidth ? b.right + 18 : b.left - 268;
    plate.style.left = px + 'px';
    plate.style.top = Math.max(20, b.top + b.height / 2 - 70) + 'px';
    plate.classList.add('show');
    el.style.boxShadow = `inset 0 0 30px rgba(255,190,90,0.35), 0 0 40px ${s.accent}66`;
  });
  el.addEventListener('mouseleave', () => {
    plate.classList.remove('show');
    el.style.boxShadow = '';
  });
  el.addEventListener('click', () => { if (zoomed === -1) ride(i, el); });
  scene.appendChild(el);
});

function ride(i, el) {
  zoomed = i;
  document.body.classList.add('zoomed');
  plate.classList.remove('show');
  const s = SUITES[i];
  document.documentElement.style.setProperty('--accent', s.accent);
  // zoom the scene toward the window: origin at window center, scale until window ~fills viewport
  const b = el.getBoundingClientRect();
  const cx = b.left + b.width / 2, cy = b.top + b.height / 2;
  // overshoot: the window grows PAST the viewport so you visibly pass through it
  const scale = Math.min(16, (innerHeight * 1.5) / b.height);
  scene.style.transformOrigin = `${cx - scene.offsetLeft}px ${cy - scene.offsetTop}px`;
  scene.style.transform = `translate(${innerWidth / 2 - cx}px, ${innerHeight / 2 - cy}px) scale(${scale})`;
  const flare = document.getElementById('flare');
  flare.classList.add('glass');
  setTimeout(() => flare.classList.add('on'), 1350);   // warm bloom as the glass fills the screen
  setTimeout(() => openDossier(i), 1900);
}

function openDossier(i) {
  const s = SUITES[i];
  document.getElementById('d-hero').style.backgroundImage = `url(assets/${s.key}-hero.jpg)`;
  document.getElementById('d-eyebrow').textContent = `// suite ${i + 1} — dossier`;
  document.getElementById('d-name').textContent = s.name;
  document.getElementById('d-line').textContent = s.line;
  document.getElementById('d-abouth').textContent = s.aboutH;
  document.getElementById('d-about').textContent = s.about;
  document.getElementById('d-stats').innerHTML = s.stats.map(x => `<div class="s"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');
  document.getElementById('d-engage').textContent = s.engage;
  const d = document.getElementById('dossier');
  d.scrollTop = 0; d.classList.add('visible');
  requestAnimationFrame(() => d.classList.add('shown'));
  document.getElementById('d-back').style.display = 'block';
  setTimeout(() => document.getElementById('flare').classList.remove('on'), 250);
  setTimeout(() => document.getElementById('flare').classList.remove('glass'), 900);
}

function back() {
  if (zoomed === -1) return;
  const d = document.getElementById('dossier');
  d.classList.remove('shown');
  document.getElementById('d-back').style.display = 'none';
  setTimeout(() => d.classList.remove('visible'), 700);
  scene.style.transform = 'none';
  zoomed = -1;
  document.body.classList.remove('zoomed');
  fit();
}
document.getElementById('d-back').addEventListener('click', back);
addEventListener('keydown', e => {
  if (e.key === 'Escape') back();
  const n = parseInt(e.key);
  if (zoomed === -1 && n >= 1 && n <= 4) {
    const el = scene.querySelectorAll('.win')[n - 1];
    if (el) ride(n - 1, el);
  }
});

/* mobile cards */
const mt = document.getElementById('mt-cards');
SUITES.forEach((s, i) => {
  const c = document.createElement('div');
  c.className = 'mt-card';
  c.style.backgroundImage = `url(assets/${s.key}-still.png)`;
  c.innerHTML = `<div class="mt-name">${s.name}</div><div class="mt-tap" style="color:${s.accent}">tap to ride up →</div>`;
  c.addEventListener('click', () => {
    document.documentElement.style.setProperty('--accent', s.accent);
    document.getElementById('flare').classList.add('on');
    zoomed = i;
    setTimeout(() => openDossier(i), 450);
  });
  mt.appendChild(c);
});
</script>
</body>
</html>
