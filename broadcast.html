<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root { --bg: #070607; --text: #EDE9E1; --dim: #8B8578; --accent: #D4AF37; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

/* ---------- dossier (tune-in page) ---------- */
#dossier { position: fixed; inset: 0; z-index: 40; display: none; overflow-y: auto; background: var(--bg); }
#dossier.visible { display: block; }
.d-hero { position: relative; height: 74vh; background-size: cover; background-position: center; }
.d-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,6,7,0.25) 0%, rgba(7,6,7,0) 35%, rgba(7,6,7,0.95) 100%); }
.d-hero-text { position: absolute; bottom: 40px; left: min(7vw, 90px); right: 7vw; z-index: 1; }
.d-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-hero-text h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(38px, 6vw, 76px); margin-top: 10px; }
.d-line { margin-top: 8px; font-size: 16px; color: var(--dim); }
.d-body { padding: 56px min(7vw, 90px) 100px; max-width: 1000px; }
.d-body h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 30px; }
.d-about { margin-top: 16px; font-size: 16.5px; line-height: 1.75; color: #C9C3B8; }
.d-stats { margin-top: 38px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.d-stats .s { border: 1px solid rgba(237, 233, 225, 0.1); border-radius: 12px; padding: 18px; }
.d-stats b { display: block; font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 26px; color: var(--accent); }
.d-stats span { display: block; margin-top: 5px; font-size: 12.5px; color: var(--dim); }
.d-engage-label { margin-top: 44px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-engage { margin-top: 12px; font-size: 16.5px; line-height: 1.7; }
.d-cta { margin-top: 36px; display: inline-block; text-decoration: none; color: var(--bg); background: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 0.06em; padding: 15px 34px; border-radius: 40px; }
#d-back {
  position: fixed; top: 24px; left: 26px; z-index: 45; display: none;
  border: 1px solid rgba(237, 233, 225, 0.18); background: rgba(10, 8, 8, 0.6);
  color: var(--text); border-radius: 30px; padding: 10px 22px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.14em; backdrop-filter: blur(10px);
}
#d-back:hover { border-color: var(--accent); color: var(--accent); }

/* ---------- the studio ---------- */
body::before {  /* wall, floor, rig light spill */
  content: ''; position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 34% 46% at 20% 0%, rgba(212, 175, 55, 0.09), transparent 70%),
    radial-gradient(ellipse 34% 46% at 80% 0%, rgba(63, 193, 201, 0.06), transparent 70%),
    linear-gradient(180deg, transparent 0 71%, rgba(26, 22, 16, 0.92) 71.5%, #0C0A08 100%),
    repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.014) 0 2px, transparent 2px 170px),
    linear-gradient(180deg, #12100D 0%, #0A0908 70%);
}
body::after {  /* lighting rig silhouette */
  content: ''; position: fixed; left: 0; right: 0; top: 0; height: 64px; z-index: 0; pointer-events: none;
  background:
    repeating-linear-gradient(90deg, transparent 0 130px, rgba(0, 0, 0, 0.75) 130px 137px),
    linear-gradient(180deg, rgba(0, 0, 0, 0.9), transparent);
}
#pool {  /* light pool on the studio floor under the monitor */
  position: fixed; left: min(6vw, 72px); bottom: 0; z-index: 1;
  width: min(60vw, 940px); height: 24vh; pointer-events: none;
  background: radial-gradient(ellipse 60% 55% at 50% 100%, rgba(212, 175, 55, 0.10), transparent 70%);
}

/* ---------- studio monitor (the big TV) ---------- */
#tv {
  position: fixed; left: min(6vw, 72px); top: 47%; transform: translateY(-50%); z-index: 2;
  width: min(60vw, 940px); aspect-ratio: 16 / 9.6;
  background: linear-gradient(160deg, #1B1815 0%, #0C0B0A 100%);
  border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; 
  box-shadow: 0 46px 110px rgba(0, 0, 0, 0.72), inset 0 1px 0 rgba(255, 255, 255, 0.07);
}
#tv::before {  /* bezel brand */
  content: 'BLTV · STUDIO 1 · SLC'; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.32em; color: rgba(212, 175, 55, 0.55);
}
#tv::after {  /* stand */
  content: ''; position: absolute; left: 50%; transform: translateX(-50%); bottom: -54px;
  width: 32%; height: 54px; z-index: -1;
  background: linear-gradient(180deg, #16130F 0%, #080706 100%);
  clip-path: polygon(22% 0, 78% 0, 100% 100%, 0 100%);
}
#onair {
  position: absolute; top: -37px; left: 22px; display: inline-flex; align-items: center; gap: 8px;
  background: #150B0B; border: 1px solid rgba(255, 90, 90, 0.55); border-radius: 6px; padding: 7px 13px;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #FF5A5A;
  box-shadow: 0 0 22px rgba(255, 60, 60, 0.25);
}
#onair::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #FF5A5A; box-shadow: 0 0 10px #FF5A5A; animation: blink 1.4s infinite; }
#screen {
  position: absolute; inset: 14px 14px 20px; z-index: 1; border-radius: 8px; overflow: hidden;
  background-size: cover; background-position: center 20%; background-color: #000;
  cursor: pointer;
}
#screen::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,6,7,0.5) 0%, rgba(7,6,7,0.05) 30%, rgba(7,6,7,0.05) 55%, rgba(7,6,7,0.72) 100%); }
/* CRT overlay: scanlines + vignette + flicker */
#crt { position: absolute; inset: 14px 14px 20px; z-index: 3; border-radius: 8px; overflow: hidden; pointer-events: none; }
#crt::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.16) 0 2px, transparent 2px 4px);
}
#crt::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 105% 100% at 50% 50%, transparent 58%, rgba(0, 0, 0, 0.55) 100%);
  animation: flicker 5s infinite;
}
@keyframes flicker { 0%, 100% { opacity: 1; } 92% { opacity: 1; } 93% { opacity: 0.86; } 94% { opacity: 1; } 97% { opacity: 0.93; } 98% { opacity: 1; } }
#static { position: absolute; inset: 14px 14px 20px; z-index: 4; border-radius: 8px; pointer-events: none; opacity: 0; }

/* ---------- network branding ---------- */
#logo { position: fixed; top: 24px; left: 28px; z-index: 10; display: flex; align-items: center; gap: 12px; }
#logo .face {
  width: 46px; height: 46px; border-radius: 50%;
  background: url(assets/plaque-face.png) center / cover no-repeat;
  border: 2px solid var(--accent); box-shadow: 0 0 16px rgba(212, 175, 55, 0.4);
}
#logo .l-name { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 24px; letter-spacing: 0.06em; }
#logo .l-sub { margin-top: 1px; font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--accent); }
#chnum {
  position: absolute; top: 28px; right: 32px; z-index: 5;
  font-family: 'DM Mono', monospace; font-size: 24px; letter-spacing: 0.12em; color: #7CFC9A;
  text-shadow: 0 0 14px rgba(124, 252, 154, 0.7); font-weight: 500;
}

/* ---------- lower third (inside the monitor) ---------- */
#lower { position: absolute; left: 34px; right: 34px; bottom: 34px; z-index: 5; }
#lt-card { display: flex; align-items: stretch; max-width: 560px; box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5); }
#lt-bar { flex: 0 0 8px; background: var(--accent); }
#lt-main { flex: 1; background: rgba(8, 7, 8, 0.84); backdrop-filter: blur(8px); padding: 14px 22px 12px; min-width: 0; }
#lt-live {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: 'DM Mono', monospace; font-size: 9.5px; letter-spacing: 0.3em; color: #FF5A5A;
}
#lt-live::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #FF5A5A; animation: blink 1.4s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
#lt-name { margin-top: 5px; font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: clamp(20px, 2.2vw, 28px); line-height: 1.1; }
#lt-name b { color: var(--accent); font-weight: 600; }
#lt-tick { margin-top: 7px; overflow: hidden; white-space: nowrap; border-top: 1px solid rgba(237, 233, 225, 0.12); padding-top: 7px; }
#lt-tick span { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11.5px; letter-spacing: 0.08em; color: var(--dim); padding-left: 100%; animation: tick 18s linear infinite; }
@keyframes tick { to { transform: translateX(-100%); } }
#tune {
  margin-top: 12px; display: inline-block; cursor: pointer;
  background: var(--accent); color: var(--bg); border: none; border-radius: 30px;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.12em; font-weight: 500;
  padding: 12px 26px;
}
#tune:hover { filter: brightness(1.12); }

/* ---------- preview monitor wall ---------- */
#wall {
  position: fixed; right: min(4vw, 54px); top: 47%; transform: translateY(-50%); z-index: 10;
  width: min(25vw, 360px);
}
#wall-label { font-family: 'DM Mono', monospace; font-size: 9.5px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; text-align: center; }
#wall-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mon {
  cursor: pointer; font-family: inherit; color: var(--text); text-align: left;
  background: linear-gradient(160deg, #171512 0%, #0C0B0A 100%);
  border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; padding: 6px 6px 5px;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.15s; -webkit-tap-highlight-color: transparent;
}
.mon:hover { border-color: var(--ch-accent); transform: translateY(-2px); }
.mon.on { border-color: var(--ch-accent); box-shadow: 0 0 24px color-mix(in srgb, var(--ch-accent) 40%, transparent); }
.mon .m-scr {
  position: relative; display: block; aspect-ratio: 16 / 9; border-radius: 5px; overflow: hidden;
  background-size: cover; background-position: center 25%; background-color: #000;
  filter: saturate(0.8) brightness(0.82);
}
.mon.on .m-scr { filter: none; }
.mon .m-scr::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.18) 0 1px, transparent 1px 3px); }
.mon.on .m-scr::before {
  content: 'ON AIR'; position: absolute; top: 4px; right: 4px; z-index: 1;
  font-family: 'DM Mono', monospace; font-size: 7px; letter-spacing: 0.16em; color: #FF5A5A;
  background: rgba(12, 6, 6, 0.85); border-radius: 3px; padding: 2px 5px;
}
.mon .m-label { display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-top: 5px; padding: 0 2px; }
.mon .m-ch { font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 0.1em; color: #7CFC9A; flex: 0 0 auto; }
.mon .m-name { font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mon.on .m-name { color: var(--ch-accent); }

#hint {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 10;
  font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
  background: rgba(8, 7, 8, 0.55); border: 1px solid rgba(237, 233, 225, 0.12); border-radius: 30px; padding: 9px 20px;
  white-space: nowrap;
}
#concept-tag {
  position: fixed; bottom: 26px; right: 30px; z-index: 10;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); border: 1px dashed rgba(139, 133, 120, 0.5); border-radius: 20px; padding: 7px 14px;
}
#concept-tag a { color: var(--dim); }

/* ---------- mobile ---------- */
@media (orientation: portrait) and (max-width: 820px), (max-height: 560px) {
  #concept-tag, #hint { display: none; }
  #logo { top: 16px; left: 16px; }
  #logo .face { width: 38px; height: 38px; }
  #logo .l-name { font-size: 18px; }
  #logo .l-sub { font-size: 7.5px; }
  #chnum { top: 14px; right: 16px; font-size: 17px; }
  #tv { left: 12px; right: 12px; width: auto; top: 88px; transform: none; aspect-ratio: auto; height: 46vh; }
  #tv::after { display: none; }
  #onair { top: -33px; left: 8px; padding: 6px 10px; font-size: 8.5px; }
  #pool { display: none; }
  #screen, #crt, #static { inset: 10px 10px 16px; }
  #lower { left: 14px; right: 14px; bottom: 20px; }
  #lt-name { font-size: 17px; }
  #tune { padding: 10px 20px; font-size: 11px; }
  #wall { top: auto; bottom: 10px; right: 0; left: 0; transform: none; width: auto; }
  #wall-label { display: none; }
  #wall-grid {
    display: flex; gap: 8px; overflow-x: auto; padding: 6px 14px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  #wall-grid::-webkit-scrollbar { display: none; }
  .mon { flex: 0 0 128px; }
  .mon:hover { transform: none; }
  .d-hero { height: 60vh; }
  .d-hero-text { left: 22px; right: 22px; }
  .d-body { padding: 44px 22px 90px; }
  .d-stats { grid-template-columns: 1fr; gap: 12px; }
}
</style>
</head>

<script>
const SUITES = [
  { key: 'speaker', name: 'The Keynote Speaker', accent: '#D4AF37', ch: '01',

    stats: [['7 Books', '5 bestsellers'], ['#1 Amazon', 'three times'], ['USA Today', 'national coverage']],

let cur = 0, switching = false;

/* preload heroes so surfing is instant */
SUITES.forEach(s => { new Image().src = `assets/${s.key}-hero.jpg`; });

/* ---------- static noise ---------- */
const cv = document.getElementById('static'), cx2d = cv.getContext('2d');
const screenElForSize = document.getElementById('screen');
function sizeCanvas() {
  const r = screenElForSize.getBoundingClientRect();
  cv.width = Math.max(1, Math.floor(r.width / 3)); cv.height = Math.max(1, Math.floor(r.height / 3));
}
sizeCanvas(); addEventListener('resize', sizeCanvas);
let noiseUntil = 0, noiseRAF = 0;
function drawNoise() {
  const img = cx2d.createImageData(cv.width, cv.height), d = img.data;
  for (let i = 0; i < d.length; i += 4) { const v = Math.random() * 255 | 0; d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255; }
  cx2d.putImageData(img, 0, 0);
  if (performance.now() < noiseUntil) { noiseRAF = requestAnimationFrame(drawNoise); }
  else { cv.style.opacity = 0; }
}
function burst(ms) {
  noiseUntil = performance.now() + ms;
  cv.style.opacity = 1;
  cancelAnimationFrame(noiseRAF);
  drawNoise();
}

/* short white-noise hiss (user-gesture initiated) */
function hiss(ms) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const len = Math.floor(ctx.sampleRate * ms / 1000);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * 0.5;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.05, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + ms / 1000);
    src.connect(g).connect(ctx.destination); src.start();
  } catch (e) { /* audio blocked — surf silently */ }
}

/* ---------- channel switching ---------- */
const screenEl = document.getElementById('screen');
function show(i) {
  cur = i;
  const s = SUITES[i];
  document.documentElement.style.setProperty('--accent', s.accent);
  screenEl.style.backgroundImage = `url(assets/${s.key}-hero.jpg)`;
  document.getElementById('chnum').textContent = 'CH ' + s.ch;
  document.getElementById('lt-bar').style.background = s.accent;
  document.getElementById('lt-name').innerHTML = `Brett Lechtenberg <b>&mdash; ${s.name.replace('The ', 'the ')}</b>`;
  document.getElementById('lt-tick-text').textContent =
    `NOW ON BLTV: "${s.show.replace(/&gt;/g, '>')}" ··· ${s.power} ··· ${s.line} ··· press TUNE IN for the full program ···`;
  document.querySelectorAll('.mon').forEach((b, n) => b.classList.toggle('on', n === i));
}
function switchTo(i, sound) {
  if (switching || i === cur || document.body.classList.contains('tuned')) return;
  switching = true;
  burst(320);
  if (sound !== false) hiss(320);
  setTimeout(() => { show(i); switching = false; }, 170);
}

/* ---------- preview monitor wall ---------- */
const wallGrid = document.getElementById('wall-grid');
SUITES.forEach((s, i) => {
  const b = document.createElement('button');
  b.className = 'mon'; b.style.setProperty('--ch-accent', s.accent);
  b.innerHTML = `
    <span class="m-scr" style="background-image:url(assets/${s.key}-hero.jpg)"></span>
    <span class="m-label">
      <span class="m-ch">CH ${s.ch}</span>
      <span class="m-name">${s.name.replace('The ', '')}</span>
    </span>`;
  b.addEventListener('click', () => switchTo(i));
  wallGrid.appendChild(b);
});

/* ---------- tune in / back ---------- */
function tuneIn() {
  if (switching || document.body.classList.contains('tuned')) return;
  document.body.classList.add('tuned');
  burst(380); hiss(380);
  const s = SUITES[cur];
  setTimeout(() => {
    document.getElementById('d-hero').style.backgroundImage = `url(assets/${s.key}-hero.jpg)`;
    document.getElementById('d-eyebrow').textContent = `// ch ${s.ch} — bltv — now playing`;
    document.getElementById('d-name').textContent = s.name;
    document.getElementById('d-line').textContent = s.line;
    document.getElementById('d-abouth').textContent = s.aboutH;
    document.getElementById('d-about').textContent = s.about;
    document.getElementById('d-stats').innerHTML = s.stats.map(x => `<div class="s"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');
    document.getElementById('d-engage').textContent = s.engage;
    document.getElementById('dossier').classList.add('visible');
    document.getElementById('d-back').style.display = 'block';
  }, 200);
}
function back() {
  if (!document.body.classList.contains('tuned')) return;
  document.getElementById('d-back').style.display = 'none';
  document.getElementById('dossier').classList.remove('visible');
  document.getElementById('dossier').scrollTop = 0;
  document.body.classList.remove('tuned');
  burst(280);
}
document.getElementById('tune').addEventListener('click', tuneIn);
screenEl.addEventListener('click', tuneIn);
document.getElementById('d-back').addEventListener('click', back);

/* ---------- keys ---------- */
addEventListener('keydown', e => {
  if (e.key === 'Escape') return back();
  if (document.body.classList.contains('tuned')) return;
  if (e.key === 'Enter') return tuneIn();
  if (e.key === 'ArrowUp') return switchTo((cur + 1) % SUITES.length);
  if (e.key === 'ArrowDown') return switchTo((cur + SUITES.length - 1) % SUITES.length);
  const n = parseInt(e.key);
  if (n >= 1 && n <= SUITES.length) switchTo(n - 1);
});

/* power on: land on CH 01 with a silent burst (no gesture yet, so no audio) */
show(0);
burst(500);
</script>
