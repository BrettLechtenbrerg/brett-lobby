<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Elevator — Brett Lechtenberg (concept)</title>
<meta name="description" content="Concept: step in, press a floor. Six ways to work with Brett Lechtenberg.">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #070607; --text: #EDE9E1; --dim: #8B8578; --accent: #D4AF37; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

/* ---------- dossier sits UNDER the doors ---------- */
#dossier {
  position: fixed; inset: 0; z-index: 5; display: none; overflow-y: auto; background: var(--bg);
}
#dossier.visible { display: block; }
.d-hero { position: relative; height: 74vh; background-size: cover; background-position: center; }
.d-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,6,7,0.25) 0%, rgba(7,6,7,0) 35%, rgba(7,6,7,0.95) 100%); }
.d-hero-text { position: absolute; bottom: 40px; left: min(7vw, 90px); right: 7vw; z-index: 1; }
.d-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-hero-text h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(38px, 6vw, 76px); margin-top: 10px; }
.d-line { margin-top: 8px; font-size: 16px; color: var(--dim); }
.d-body { padding: 56px min(7vw, 90px) 100px; max-width: 1000px; }
.d-body h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 30px; }
.d-about { margin-top: 16px; font-size: 16.5px; line-height: 1.75; color: #C9C3B8; }
.d-stats { margin-top: 38px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.d-stats .s { border: 1px solid rgba(237, 233, 225, 0.1); border-radius: 12px; padding: 18px; }
.d-stats b { display: block; font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 26px; color: var(--accent); }
.d-stats span { display: block; margin-top: 5px; font-size: 12.5px; color: var(--dim); }
.d-engage-label { margin-top: 44px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
.d-engage { margin-top: 12px; font-size: 16.5px; line-height: 1.7; }
.d-cta { margin-top: 36px; display: inline-block; text-decoration: none; color: var(--bg); background: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 0.06em; padding: 15px 34px; border-radius: 40px; }
#d-back {
  position: fixed; top: 24px; left: 26px; z-index: 45; display: none;
  border: 1px solid rgba(237, 233, 225, 0.18); background: rgba(10, 8, 8, 0.6);
  color: var(--text); border-radius: 30px; padding: 10px 22px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.14em; backdrop-filter: blur(10px);
}
#d-back:hover { border-color: var(--accent); color: var(--accent); }

/* ---------- the doors (cover everything) ---------- */
#doors { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
.door {
  position: absolute; top: 0; bottom: 0; width: 50.5%;
  background:
    repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.22) 0 2px, transparent 2px 84px),
    radial-gradient(ellipse 120% 60% at 50% 40%, rgba(212, 175, 55, 0.14) 0%, transparent 65%),
    linear-gradient(90deg, #0C0A07 0%, #191409 24%, #2B2110 48%, #33270F 55%, #241B0C 72%, #0F0C07 100%);
  transition: transform 1.4s cubic-bezier(0.65, 0, 0.25, 1);
  will-change: transform;
}
.door::before {  /* art-deco inset panel */
  content: ''; position: absolute; inset: 7% 12%;
  border: 1px solid rgba(212, 175, 55, 0.22);
  box-shadow: inset 0 0 0 8px rgba(0, 0, 0, 0.3), inset 0 0 90px rgba(0, 0, 0, 0.55);
  background: repeating-linear-gradient(180deg, transparent 0 110px, rgba(212, 175, 55, 0.06) 110px 112px);
}
#door-l { left: 0; }
#door-r { right: 0; }
#door-l::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, rgba(255, 226, 140, 0.5), rgba(120, 90, 30, 0.55), rgba(255, 226, 140, 0.45));
}
body.open #door-l { transform: translateX(-101%); }
body.open #door-r { transform: translateX(101%); }
/* ride shake */
body.riding #doors { animation: hum 0.42s ease-in-out infinite; }
@keyframes hum { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(1.6px); } }

/* ---------- floor indicator ---------- */
#indicator {
  position: fixed; top: 26px; left: 50%; transform: translateX(-50%); z-index: 20;
  display: flex; gap: 8px; align-items: center;
  background: rgba(7, 6, 7, 0.82); border: 1px solid rgba(212, 175, 55, 0.35); border-radius: 30px;
  padding: 10px 18px; transition: opacity 0.5s;
}
.ind {
  width: 34px; height: 26px; display: grid; place-items: center; border-radius: 6px;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.06em; color: var(--dim);
  transition: background 0.2s, color 0.2s, box-shadow 0.2s;
}
.ind.lit { background: var(--accent); color: var(--bg); font-weight: 500; box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 70%, transparent); }

/* ---------- brass panel ---------- */
#panel {
  position: fixed; right: min(5vw, 70px); top: 50%; transform: translateY(-50%); z-index: 20;
  width: min(330px, 86vw);
  background: linear-gradient(160deg, #2A2113 0%, #17120A 100%);
  border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 16px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 226, 140, 0.25);
  padding: 22px 22px 18px; transition: opacity 0.5s;
}
#panel .p-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--accent); text-align: center; }
#floors { margin-top: 16px; display: grid; gap: 9px; }
.floor {
  display: flex; align-items: center; gap: 14px; width: 100%;
  background: rgba(7, 6, 7, 0.45); border: 1px solid rgba(237, 233, 225, 0.1); border-radius: 12px;
  padding: 9px 12px; cursor: pointer; text-align: left; color: var(--text);
  transition: border-color 0.25s, background 0.25s, transform 0.15s;
  -webkit-tap-highlight-color: transparent; font-family: inherit;
}
.floor:hover { border-color: var(--fl-accent); background: rgba(15, 12, 8, 0.75); transform: translateX(-3px); }
.floor.lit { border-color: var(--fl-accent); }
.floor .f-btn {
  flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'DM Mono', monospace; font-size: 13px; color: #E9DCB0;
  background: radial-gradient(circle at 34% 30%, #5A4820, #241C0E 72%);
  border: 1px solid rgba(212, 175, 55, 0.5);
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.6), 0 1px 0 rgba(255, 226, 140, 0.18);
  transition: box-shadow 0.25s, background 0.25s;
}
.floor.lit .f-btn {
  background: radial-gradient(circle at 34% 30%, color-mix(in srgb, var(--fl-accent) 80%, white), color-mix(in srgb, var(--fl-accent) 55%, black) 75%);
  color: var(--bg); box-shadow: 0 0 22px color-mix(in srgb, var(--fl-accent) 75%, transparent);
}
.floor .f-name { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
.floor .f-power { margin-top: 3px; font-size: 11.5px; line-height: 1.35; color: var(--dim); }
body.riding .floor { pointer-events: none; }

/* ---------- title / hud ---------- */
#hud-top { position: fixed; top: 26px; left: 30px; z-index: 20; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.18em; color: var(--accent); transition: opacity 0.5s; }
#hud-top a { color: var(--accent); text-decoration: none; }
#concept-tag {
  position: fixed; bottom: 26px; right: 30px; z-index: 20; transition: opacity 0.5s;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); border: 1px dashed rgba(139, 133, 120, 0.5); border-radius: 20px; padding: 7px 14px;
}
#concept-tag a { color: var(--dim); }
#title { position: fixed; left: min(6vw, 80px); top: 50%; transform: translateY(-50%); z-index: 20; max-width: 400px; transition: opacity 0.5s; }
#title .t-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); }
#title h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(34px, 4.2vw, 62px); line-height: 1.05; margin-top: 14px; }
#title p { margin-top: 14px; font-size: 15px; line-height: 1.6; color: var(--dim); }
#status {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 20;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #E9C767;
  background: rgba(10, 8, 8, 0.55); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 30px;
  padding: 11px 24px; white-space: nowrap; transition: opacity 0.4s;
}
body.arrived #panel, body.arrived #title, body.arrived #indicator, body.arrived #hud-top,
body.arrived #concept-tag, body.arrived #status { opacity: 0; pointer-events: none; }

/* ---------- mobile ---------- */
@media (orientation: portrait) and (max-width: 820px), (max-height: 560px) {
  #hud-top, #concept-tag { display: none; }
  #title { left: 20px; right: 20px; top: 80px; transform: none; max-width: none; text-align: center; }
  #title h1 { font-size: 30px; }
  #title p { display: none; }
  #panel { right: 50%; transform: translate(50%, 0); top: auto; bottom: 76px; }
  #indicator { top: 18px; padding: 8px 12px; gap: 5px; }
  .ind { width: 28px; height: 22px; font-size: 10.5px; }
  #status { bottom: 22px; font-size: 10px; }
  .d-hero { height: 60vh; }
  .d-hero-text { left: 22px; right: 22px; }
  .d-body { padding: 44px 22px 90px; }
  .d-stats { grid-template-columns: 1fr; gap: 12px; }
}
</style>
</head>
<body>

<div id="dossier">
  <div class="d-hero" id="d-hero">
    <div class="d-hero-text">
      <div class="d-eyebrow" id="d-eyebrow"></div>
      <h1 id="d-name"></h1>
      <div class="d-line" id="d-line"></div>
    </div>
  </div>
  <div class="d-body">
    <h2 id="d-abouth"></h2>
    <p class="d-about" id="d-about"></p>
    <div class="d-stats" id="d-stats"></div>
    <div class="d-engage-label">// how to engage</div>
    <p class="d-engage" id="d-engage"></p>
    <a class="d-cta" href="contact.html">Start the conversation &rarr;</a>
  </div>
</div>
<button id="d-back">&larr; back to the elevator</button>

<div id="doors">
  <div class="door" id="door-l"></div>
  <div class="door" id="door-r"></div>
</div>

<div id="indicator"></div>
<div id="hud-top">// <a href="index.html">brettlechtenberg.com</a></div>
<div id="concept-tag">concept d — <a href="index.html">back to lobby</a></div>

<div id="title">
  <div class="t-eyebrow">// the elevator</div>
  <h1>Going up?</h1>
  <p>Six floors. Six ways to work with Brett. Press a button — the building knows the way.</p>
</div>

<div id="panel">
  <div class="p-label">— select floor —</div>
  <div id="floors"></div>
</div>

<div id="status">standing at lobby &mdash; press a floor</div>

<script>
const SUITES = [
  { key: 'speaker', name: 'The Keynote Speaker', accent: '#D4AF37', floor: '1',
    power: 'Your audience leaves changed — not just entertained.',
    line: 'Keynotes, corporate training, and workshops.',
    aboutH: 'Transformation over transaction.',
    about: 'Science-backed keynotes built on the Master\'s Edge methodology — First Principles to clarify, Frontloading to simplify, and Flow to maximize — tailored to your room, your industry, and your outcomes. From Fortune 500 teams like American Express and Delta to chambers of commerce and championship locker rooms, Brett delivers transformation that outlasts the event.',
    stats: [['4 Lanes', 'one methodology'], ['Fortune 500', 'AmEx · Delta · Citigroup'], ['60–90 min', 'keynote to full-day']],
    engage: 'Booking keynotes, corporate trainings, and workshops. If your event needs energy AND substance — with tools your people use Monday morning — this is the suite.' },
  { key: 'coach', name: 'The Performance Coach', accent: '#C4324A', floor: '2',
    power: 'Finds the gap between where you are and who you could be.',
    line: 'The Master\'s Edge — Clarify. Simplify. Maximize.',
    aboutH: 'A proven system for peak performance.',
    about: 'The Master\'s Edge is Brett\'s proprietary coaching methodology — built on 30+ years of real-world business ownership, original flow state research validated by the Flow Research Collective, and the same progressive mastery framework that creates black belts. He only teaches what he\'s tested in his own business. That\'s the difference.',
    stats: [['30+', 'years in business'], ['Flow Research', 'validated methodology'], ['3 Pillars', 'mindset · skillset · systems']],
    engage: 'Taking a limited number of private coaching clients — leaders, teams, and business owners ready to operate differently. No pitch. No pressure. Bring a real goal.' },
  { key: 'ai', name: 'The AI Strategist', accent: '#3FC1C9', floor: '3',
    power: 'Makes AI useful in your business — not just impressive in a demo.',
    line: 'AI strategy, implementation, and training for real-world businesses.',
    aboutH: 'From AI-curious to AI-operational.',
    about: 'AI strategy and implementation for real-world people and businesses — no hype, no jargon, no shelf-ware. Brett maps AI to the problems actually costing you time and money, and builds working workflows with you: your team ships a functioning AI workflow before they leave the room. The tools change weekly; the thinking is what he teaches.',
    stats: [['Hands-On', 'your team builds it live'], ['Real Workflows', 'shipped, not demoed'], ['No Hype', 'AI for real-world business']],
    engage: 'Booking AI strategy sessions, implementation sprints, and team trainings. Bring the bottleneck — Brett will show you where AI actually fits, and where it doesn\'t.' },
  { key: 'trainer', name: 'The Corporate Trainer', accent: '#9AA5A0', floor: '4',
    power: 'Keynotes inspire. Training transforms.',
    line: 'Hands-on workshops. Tools they use Monday morning.',
    aboutH: 'Train the team you actually have.',
    about: 'Hands-on workshops built on the Master\'s Edge — customized to your team, your industry, and the problem you\'re actually solving. Winning Team Culture. The AI Edge. Reclaiming The Clock. The Honest Close. No off-the-shelf content, no recycled decks.',
    stats: [['4 Workshops', 'culture · AI · time · sales'], ['Hands-On', 'build it before you leave'], ['90 min', 'to multi-phase programs']],
    engage: 'Booking half-day and full-day trainings. Tell Brett the problem you\'re solving — he\'ll tell you honestly if he\'s the right fit.' },
  { key: 'author', name: 'The Author', accent: '#E8C84A', floor: '5',
    power: 'Teaches what he\'s tested. Writes what he\'s lived.',
    line: 'Seven books. Five bestsellers.',
    aboutH: 'Ideas that have helped thousands.',
    about: 'Seven books, five bestsellers — including three #1 Amazon bestsellers. Reclaiming The Clock on time and focus; The Anti-Bully Program and The Anti-Cyber Bully Program, nationally recognized and featured in USA Today; The Ultimate Travel Safety Program; Protecting Your Castle; and Bullyproof. The seventh — The Master\'s Edge, the definitive guide to his peak performance methodology — is forthcoming.',
    stats: [['7 Books', '5 bestsellers'], ['#1 Amazon', 'three times'], ['USA Today', 'national coverage']],
    engage: 'Media appearances, podcast interviews, and bulk orders for teams. Start with the free one — How to Build a Rockstar Team. The books are the door; walk through it.' },
  { key: 'sensei', name: 'The Sensei', accent: '#C0392B', floor: 'B1',
    power: 'Every other Brett was built in this room.',
    line: 'Martial arts mastery — 30+ years on the mat.',
    aboutH: 'Where the method was forged.',
    about: 'Before the keynotes, the coaching, and the AI workflows, there was the mat. Brett has spent 30+ years in the martial arts — building Personal Mastery Martial Arts in Utah, coaching students from first bow to black belt, and turning the dojo\'s progressive mastery framework into the Master\'s Edge methodology. His nationally recognized Anti-Bully and Anti-Cyber Bully programs came out of this room too. The dojo is where he learned the truth he teaches everywhere else: mastery is built, not born.',
    stats: [['30+', 'years on the mat'], ['Black Belt', 'progressive mastery framework'], ['Bullyproof', 'nationally recognized programs']],
    engage: 'Martial arts training, self-defense workshops, and anti-bully programs for schools, families, and teams. This is the room people don\'t expect — and the one that explains all the others.' },
];

/* floor strip: B1 at left, lobby, then up */
const STRIP = ['B1', 'L', '1', '2', '3', '4', '5'];
let at = 'L', riding = false, arrivedIdx = -1;

/* indicator */
const ind = document.getElementById('indicator');
STRIP.forEach(f => {
  const c = document.createElement('div');
  c.className = 'ind'; c.dataset.f = f; c.textContent = f;
  ind.appendChild(c);
});
function light(f) {
  at = f;
  ind.querySelectorAll('.ind').forEach(c => c.classList.toggle('lit', c.dataset.f === f));
}
light('L');

/* panel — floors listed top-down: 5 4 3 2 1 B1 */
const floorsEl = document.getElementById('floors');
const ORDER = [4, 3, 2, 1, 0, 5]; // SUITES indices: author, trainer, ai, coach, speaker, sensei
ORDER.forEach(i => {
  const s = SUITES[i];
  const b = document.createElement('button');
  b.className = 'floor'; b.style.setProperty('--fl-accent', s.accent);
  b.innerHTML = `
    <span class="f-btn">${s.floor}</span>
    <span>
      <span class="f-name">${s.name.replace('The ', '')}</span>
      <span class="f-power" style="display:block">${s.power}</span>
    </span>`;
  b.addEventListener('click', () => ride(i, b));
  floorsEl.appendChild(b);
});

/* soft two-tone ding (WebAudio, fires on user-gesture-initiated ride) */
function ding() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[830, 0], [622, 0.18]].forEach(([f, t]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t + 0.6);
      o.connect(g).connect(ctx.destination);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.7);
    });
  } catch (e) { /* audio blocked — ride silently */ }
}

const statusEl = document.getElementById('status');
function ride(i, btn) {
  if (riding || document.body.classList.contains('arrived')) return;
  riding = true;
  const s = SUITES[i];
  document.documentElement.style.setProperty('--accent', s.accent);
  document.querySelectorAll('.floor').forEach(f => f.classList.remove('lit'));
  if (btn) btn.classList.add('lit');
  document.body.classList.add('riding');
  statusEl.textContent = (STRIP.indexOf(s.floor) > STRIP.indexOf(at) ? 'going up — ' : 'going down — ') + s.name.toLowerCase();

  /* step the indicator floor by floor */
  const from = STRIP.indexOf(at), to = STRIP.indexOf(s.floor);
  const dir = to > from ? 1 : -1;
  const steps = [];
  for (let f = from + dir; dir > 0 ? f <= to : f >= to; f += dir) steps.push(STRIP[f]);
  const PER = 520;
  steps.forEach((f, n) => setTimeout(() => light(f), PER * (n + 1)));

  const total = PER * (steps.length + 1);
  setTimeout(() => {
    document.body.classList.remove('riding');
    ding();
    statusEl.textContent = `floor ${s.floor} — ${s.name.toLowerCase()}`;
  }, total);
  setTimeout(() => { openDossier(i); }, total + 650);
}

function openDossier(i) {
  arrivedIdx = i;
  const s = SUITES[i];
  document.getElementById('d-hero').style.backgroundImage = `url(assets/${s.key}-hero.jpg)`;
  document.getElementById('d-eyebrow').textContent = `// floor ${s.floor} — you have arrived`;
  document.getElementById('d-name').textContent = s.name;
  document.getElementById('d-line').textContent = s.line;
  document.getElementById('d-abouth').textContent = s.aboutH;
  document.getElementById('d-about').textContent = s.about;
  document.getElementById('d-stats').innerHTML = s.stats.map(x => `<div class="s"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');
  document.getElementById('d-engage').textContent = s.engage;
  document.getElementById('dossier').classList.add('visible');
  document.body.classList.add('arrived');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.body.classList.add('open');           // doors part, revealing the room
    setTimeout(() => { document.getElementById('d-back').style.display = 'block'; riding = false; }, 900);
  }));
}

function back() {
  if (!document.body.classList.contains('arrived') || riding) return;
  riding = true;
  document.getElementById('d-back').style.display = 'none';
  document.body.classList.remove('open');          // doors close over the room
  setTimeout(() => {
    document.getElementById('dossier').classList.remove('visible');
    document.getElementById('dossier').scrollTop = 0;
    document.body.classList.remove('arrived');
    document.querySelectorAll('.floor').forEach(f => f.classList.remove('lit'));
    statusEl.textContent = `standing at floor ${SUITES[arrivedIdx].floor} — press a floor`;
    riding = false;
  }, 1450);
}
document.getElementById('d-back').addEventListener('click', back);
addEventListener('keydown', e => {
  if (e.key === 'Escape') back();
  const n = parseInt(e.key);
  if (n >= 1 && n <= 6 && !riding && !document.body.classList.contains('arrived')) {
    const idx = ORDER[n - 1];
    ride(idx, floorsEl.children[n - 1]);
  }
});
</script>
</body>
</html>
